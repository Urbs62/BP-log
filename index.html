<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BP Log</title>

  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="BP Log" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>BP Log</h1>
        <p>Logga blodtryck och puls enkelt.</p>
        <p class="appVersion">v1.0</p>
      </div>
    </header>

    <section class="card">
      <h2>Ny mätning</h2>

      <form id="bpForm">
        <div class="grid">
          <label>
            Övertryck
            <input id="systolic" type="number" inputmode="numeric" min="50" max="260" placeholder="t.ex. 125" required />
          </label>

          <label>
            Undertryck
            <input id="diastolic" type="number" inputmode="numeric" min="30" max="160" placeholder="t.ex. 78" required />
          </label>

          <label>
            Puls
            <input id="pulse" type="number" inputmode="numeric" min="30" max="220" placeholder="t.ex. 64" required />
          </label>

          <label>
            Tidpunkt
            <input id="measuredAt" type="datetime-local" required />
          </label>
        </div>

        <label>
          Kommentar
          <input id="note" type="text" placeholder="t.ex. morgon, kväll, efter promenad" />
        </label>

        <div id="liveResult" class="result muted">
          Fyll i värden för bedömning.
        </div>

        <button type="submit">Spara mätning</button>
      </form>
    </section>

    <section class="card">
      <div class="sectionHeader">
        <h2>Historik</h2>
        <button id="clearAllBtn" class="secondary" type="button">Rensa allt</button>
      </div>

      <div id="summary" class="summary"></div>
      <div id="historyList" class="history"></div>
    </section>

    <section class="card">
      <h2>Diagram</h2>
      <p class="muted">Interaktivt diagram för övertryck, undertryck och puls.</p>
      <div id="chart" class="chart">
        <canvas id="bpChart" aria-label="Blodtryck och puls över tid" role="img"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
